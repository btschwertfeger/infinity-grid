# Workflow to build the docker image for pull requests

name: Build and Upload Container Image

on:
  workflow_call:

permissions:
  packages: write
  contents: read

jobs:
  Build-and-Push:
    name: Build and conditionally publish PR container image to GitHub Container Registry
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          disable-sudo: true
          egress-policy: audit
          allowed-endpoints: >
            auth.docker.io:443
            deb.debian.org:80
            files.pythonhosted.org:443
            ghcr.io:443
            github.com:443
            production.cloudflare.docker.com:443
            pypi.org:443
            registry-1.docker.io:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # IMPORTANT: otherwise the current tag does not get fetched and the build version gets worse

      - name: Download the built wheel
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: python-package-distributions
          path: dist/

      # ========================================================================
      # Login to Registries
      - name: Log in to GitHub Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: |
          success()
          && (github.actor == 'btschwertfeger' || github.actor == 'dependabot[bot]')

      # ========================================================================
      # Build Setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Extract version from the built wheel filename
            wheel_file=$(ls dist/*.whl | head -1)
            version=$(basename "$wheel_file" | sed 's/infinity_grid-\([^-]*\)-.*/\1/')
            echo "version=${version}" >> $GITHUB_OUTPUT
          fi

      # ========================================================================
      # Build and test container image
      - name: Build and push container image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            CREATE_TIME=${{ steps.date.outputs.date }}
        if: |
          success()
          && (github.actor == 'btschwertfeger' || github.actor == 'dependabot[bot]')

      # Check if multi-platform build works on other actors
      - name: Build container image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            CREATE_TIME=${{ steps.date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: |
          success()
          && (github.actor != 'btschwertfeger' && github.actor != 'dependabot[bot]')

      # Build it again to check if loading and testing works
      # The reason for building it again is that one cannot load multi-platform
      # images directly after building them with push=false.
      # This build will benefit from the cache created earlier.
      - name: Build container image (just to load)
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            CREATE_TIME=${{ steps.date.outputs.date }}
          cache-from: type=gha
        if: |
          success()
          && (github.actor != 'btschwertfeger' && github.actor != 'dependabot[bot]')

      - name: Test container image
        run: |
          docker run --rm --entrypoint=infinity-grid ghcr.io/${{ github.repository }}:pr-${{ github.event.number }} --help
