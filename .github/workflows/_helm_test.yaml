# Template file for validating the Helm Chart provided by the infinity-grid.
#

name: Helm Test

on:
  workflow_call:
    secrets:
      KUBECONFIG:
        required: true

permissions:
  contents: read

jobs:
  Validate-Chart:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            get.helm.sh:443
            github.com:443
            ultimate-bots.com:6443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # IMPORTANT: otherwise the current tag does not get fetched and the build version gets worse

      - name: Set up Kubernetes config
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          chmod go-rwx ~/.kube
          echo "$KUBECONFIG" > ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: "latest"

      - name: Test Helm template rendering
        run: |
          helm template test-release helm/infinity-grid/ \
            --values tests/deployment/values.yaml \
            --set-string infinityGrid.apiPublicKey="foo" \
            --set-string infinityGrid.apiSecretKey="bar" \
            --set-string database.password="baz" \
            --debug

      # The following steps are commented out as long as the maintenance
      # overhead for the cluster is higher than the benefits of this workflow.

